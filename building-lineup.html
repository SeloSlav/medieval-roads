<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Building Art Direction Lineup</title>
    <style>
      :root { color-scheme: dark; font-family: Inter, ui-sans-serif, system-ui, sans-serif; }
      * { box-sizing: border-box; }
      html, body { width: 100%; height: 100%; margin: 0; overflow: hidden; background: #151912; }
      body { display: grid; grid-template-rows: 74px 1fr; }
      header {
        display: flex; align-items: center; justify-content: space-between; padding: 0 28px;
        border-bottom: 1px solid rgba(224,192,120,.28);
        background: linear-gradient(180deg, #25291f, #1b2018); color: #eee8dc;
      }
      h1 { margin: 0; font-family: Georgia, serif; font-size: 26px; font-weight: 600; letter-spacing: .02em; }
      header p { margin: 0; color: #beb59f; font-size: 12px; letter-spacing: .08em; text-transform: uppercase; }
      main { position: relative; min-height: 0; }
      canvas { position: absolute; inset: 0; width: 100%; height: 100%; display: block; }
      #labels {
        position: absolute; inset: 0; display: grid; grid-template-columns: repeat(7, minmax(0, 1fr));
        grid-template-rows: repeat(3, minmax(0, 1fr)); pointer-events: none;
      }
      .cell { position: relative; border-right: 1px solid rgba(229,214,176,.12); border-bottom: 1px solid rgba(229,214,176,.12); }
      .label {
        position: absolute; left: 12px; right: 12px; bottom: 8px; padding: 5px 8px;
        border: 1px solid rgba(25,24,18,.42); border-radius: 3px;
        background: rgba(28,29,22,.78); color: #f0e7d2; text-align: center;
        font-family: Georgia, serif; font-size: 13px; letter-spacing: .035em;
        box-shadow: 0 2px 7px rgba(0,0,0,.18); backdrop-filter: blur(3px);
      }
    </style>
  </head>
  <body>
    <header>
      <h1>Settlement Building Lineup</h1>
      <p>Shared plaster · masonry · timber · clay tile material library</p>
    </header>
    <main id="lineup-root"><div id="labels" aria-hidden="true"></div></main>
    <script type="module" src="/src/e2e/buildingLineup.ts"></script>
  </body>
</html>
